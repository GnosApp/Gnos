<svg width="320" height="320" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sepia-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6ec"/>
      <stop offset="100%" stop-color="#f0e6d2"/>
    </linearGradient>
    <linearGradient id="sepia-quill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5e3c"/>
      <stop offset="50%" stop-color="#a0522d"/>
      <stop offset="100%" stop-color="#6b3a1f"/>
    </linearGradient>
    <radialGradient id="sepia-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c49a5a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c49a5a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#sepia-bg)"/>
  <ellipse cx="30" cy="30" rx="22" ry="26" fill="url(#sepia-glow)"/>

