      <stop offset="0%" stop-color="#1a0a1e"/>
      <stop offset="100%" stop-color="#0f0a04"/>
    </linearGradient>
    <linearGradient id="sunset-quill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7c35a"/>
      <stop offset="50%" stop-color="#e8692a"/>
      <stop offset="100%" stop-color="#c0345a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8692a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e8692a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#sunset-bg)"/>
  <ellipse cx="30" cy="30" rx="22" ry="26" fill="url(#glow)"/>

