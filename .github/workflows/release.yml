name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          source "$HOME/.cargo/env"
          npm run tauri -- build

      - name: Get tag message
        id: tag_message
        run: |
          MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          echo "NOTES=$MSG" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          node -e "
            const fs = require('fs');
            const sig = fs.readFileSync('src-tauri/target/release/bundle/macos/Gnos.app.tar.gz.sig', 'utf8').trim();
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            const tag = process.env.GITHUB_REF_NAME;
            const notes = process.env.RELEASE_NOTES || 'No changelog provided.';
            const json = {
              version: conf.version,
              notes,
              pub_date: new Date().toISOString(),
              platforms: {
                'darwin-aarch64': {
                  url: \`https://github.com/GnosApp/Gnos/releases/download/\${tag}/Gnos.app.tar.gz\`,
                  signature: sig,
                },
              },
            };
            fs.writeFileSync('latest.json', JSON.stringify(json, null, 2));
          "
        env:
          RELEASE_NOTES: ${{ steps.tag_message.outputs.NOTES }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/macos/Gnos.app.tar.gz
            src-tauri/target/release/bundle/macos/Gnos.app.tar.gz.sig
            latest.json
