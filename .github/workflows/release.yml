name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: npm ci
      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          source "$HOME/.cargo/env"
          npm run tauri -- build
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            src-tauri/target/release/bundle/macos/Gnos.app.tar.gz
            src-tauri/target/release/bundle/macos/Gnos.app.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: npm ci
      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: npm ci
      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  publish:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: macos
          path: artifacts/macos
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: artifacts/linux

      - name: Get tag message
        id: tag_message
        run: |
          {
            echo "NOTES<<__RELEASE_NOTES_EOF__"
            git tag -l --format='%(contents)' "$GITHUB_REF_NAME"
            echo "__RELEASE_NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        run: |
          node -e "
            const fs = require('fs');
            const tag = process.env.GITHUB_REF_NAME;
            const notes = process.env.RELEASE_NOTES || 'No changelog provided.';
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));

            const macSig = fs.readFileSync('artifacts/macos/Gnos.app.tar.gz.sig', 'utf8').trim();

            const winFiles = fs.readdirSync('artifacts/windows');
            const winSigFile = winFiles.find(f => f.endsWith('.sig'));
            const winExeFile = winSigFile.replace('.sig', '');
            const winSig = fs.readFileSync('artifacts/windows/' + winSigFile, 'utf8').trim();

            const linuxFiles = fs.readdirSync('artifacts/linux');
            const linuxSigFile = linuxFiles.find(f => f.endsWith('.sig'));
            const linuxAppFile = linuxSigFile.replace('.sig', '');
            const linuxSig = fs.readFileSync('artifacts/linux/' + linuxSigFile, 'utf8').trim();

            const json = {
              version: conf.version,
              notes,
              pub_date: new Date().toISOString(),
              platforms: {
                'darwin-aarch64': {
                  url: \`https://github.com/GnosApp/Gnos/releases/download/\${tag}/Gnos.app.tar.gz\`,
                  signature: macSig,
                },
                'windows-x86_64': {
                  url: \`https://github.com/GnosApp/Gnos/releases/download/\${tag}/\${winExeFile}\`,
                  signature: winSig,
                },
                'linux-x86_64': {
                  url: \`https://github.com/GnosApp/Gnos/releases/download/\${tag}/\${linuxAppFile}\`,
                  signature: linuxSig,
                },
              },
            };
            fs.writeFileSync('latest.json', JSON.stringify(json, null, 2));
            console.log(JSON.stringify(json, null, 2));
          "
        env:
          RELEASE_NOTES: ${{ steps.tag_message.outputs.NOTES }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos/Gnos.app.tar.gz
            artifacts/macos/Gnos.app.tar.gz.sig
            artifacts/windows/*.exe
            artifacts/windows/*.exe.sig
            artifacts/linux/*.AppImage
            artifacts/linux/*.AppImage.sig
            latest.json
